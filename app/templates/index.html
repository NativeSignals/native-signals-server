<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Native Signals Server</title>

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="eyebrow">Control Center</p>

            <h1>Native Signals Server</h1>

            <p class="subtitle">
                Local control platform for Native Signals live rig.
            </p>

            <p class="version">
                Version {{ version }}
            </p>
        </section>

        <section class="grid">
            {% for device in devices %}
            <a class="card" href="{{ device.url }}">
                <span class="status {{ device.status }}"></span>

                <h2>{{ device.name }}</h2>

                <p>{{ device.description }}</p>
            </a>
            {% endfor %}
        </section>

        <section class="danger-zone">
            <a class="danger-button" href="/shutdown">
                Shutdown System
            </a>
        </section>
    </main>
</body>
</html>
