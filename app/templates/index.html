<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Native Signals Server</title>
    <link rel="icon" href="/static/images/favicon.ico">

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="eyebrow">Control Center</p>

            <h1>Native Signals Server</h1>

            <p class="subtitle">
                Local control platform for Native Signals live rig.
            </p>

            <p class="version">
                Version {{ version }}
            </p>
        </section>

        <section class="grid">
            {% for device in devices %}
            <a class="card" href="{{ device.url }}">
                <span
                    class="status {{ device.status }}"
                    id="status-{{ device.status_id }}"
                ></span>

                <h2>{{ device.name }}</h2>

                <p>{{ device.description }}</p>
            </a>
            {% endfor %}
        </section>

                <section class="system-actions">
            <a class="danger-button" href="/shutdown">
                <span class="button-icon">⏻</span>
                Shutdown System
            </a>

            <a class="system-button" href="/devices">
                <span class="button-icon">▣</span>
                System Status
            </a>
        </section>
    </main>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
