<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | NSS</title>
    <link rel="icon" href="/static/images/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="shell">
        <a class="back-link" href="/">← Back to Dashboard</a>

        <section class="hero">
            <p class="eyebrow">Native Signals Server</p>
            <h1>{{ title }}</h1>
            <p class="subtitle">{{ subtitle }}</p>
            <p class="version">Version {{ version }}</p>
        </section>

        <section class="panel">
            <p>This module is ready for implementation.</p>

            {% if launch_target %}
            <div class="action-row">
                <button
                    class="primary-button"
                    id="launch-button"
                    data-launch-target="{{ launch_target }}"
                >
                    Launch {{ title }}
                </button>
            </div>

            <p class="hint" id="launch-status"></p>
            {% endif %}
        </section>

        <script src="/static/js/launcher.js"></script>
    </main>
</body>
</html>
